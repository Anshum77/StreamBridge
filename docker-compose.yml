services:
  app:
    build:
      context: .
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://${POSTGRES_USER:-streambridge}:${POSTGRES_PASSWORD:-streambridge}@postgres:5432/${POSTGRES_DB:-streambridge}?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      MIGRATIONS_PATH: migrations
      SHUTDOWN_TIMEOUT: 15s
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-streambridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-streambridge}
      POSTGRES_DB: ${POSTGRES_DB:-streambridge}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
